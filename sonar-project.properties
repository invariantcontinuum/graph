sonar.organization=invariantcontinuum
sonar.projectKey=invariantcontinuum_graph
sonar.projectName=graph
sonar.projectVersion=1.0

# Source and Test directories
sonar.sources=react,crates
sonar.tests=react
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage reporting
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions — keep the scan focused on hand-written Rust + TypeScript.
#
# Why each entry exists:
#   node_modules/**, **/node_modules/**  — third-party dependencies.
#   target/**, pkg/**, dist/**           — Rust + wasm-pack + bundler build outputs.
#   site/**                              — Next.js showcase has its own lifecycle
#                                          and emits ~20k HTML issues from `out/`
#                                          that drown real signal.
#   coverage/**                          — vitest lcov output (base.css, sorter.js etc.)
#                                          is the coverage UI, not source under review.
#   **/*_wasm.js, **/*_wasm_bg.js        — wasm-bindgen generated glue JS; the one
#                                          BLOCKER "dynamic code execution" flag at
#                                          graph_worker_wasm.js:542 is `new Function(...)`
#                                          that bindgen writes itself — unfixable at source.
#   **/*.wasm                            — binary artifact.
#
# If you add a new generated directory, extend this list rather than moving
# handwritten sources out of `sonar.sources`.
sonar.exclusions=node_modules/**,**/node_modules/**,target/**,pkg/**,dist/**,site/**,coverage/**,**/*_wasm.js,**/*_wasm_bg.js,**/*.wasm
sonar.sourceEncoding=UTF-8
