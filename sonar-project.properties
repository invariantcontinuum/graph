sonar.organization=invariantcontinuum
sonar.projectKey=invariantcontinuum_graph
sonar.projectName=graph
sonar.projectVersion=1.0

# Source and Test directories
sonar.sources=react,crates
sonar.tests=react
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage reporting
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=node_modules/**,target/**,pkg/**,dist/**,*.js,*.wasm
sonar.sourceEncoding=UTF-8
